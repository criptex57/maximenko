services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-wordpress}
      MYSQL_USER: ${DB_USER:-wordpress}
      MYSQL_PASSWORD: ${DB_PASSWORD:-wordpress}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-change-me-root}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 30

  wordpress:
    image: wordpress:php8.3-apache
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:${WORDPRESS_PORT:-8080}:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${DB_NAME:-wordpress}
      WORDPRESS_DB_USER: ${DB_USER:-wordpress}
      WORDPRESS_DB_PASSWORD: ${DB_PASSWORD:-wordpress}
      WORDPRESS_DEBUG: "0"
      WORDPRESS_CONFIG_EXTRA: |
        define('DISALLOW_FILE_EDIT', true);
        define('WP_ENVIRONMENT_TYPE', 'local');
    volumes:
      - wordpress_data:/var/www/html
      - ./wp-content/themes/olga-maksimenko:/var/www/html/wp-content/themes/olga-maksimenko
    healthcheck:
      test: ["CMD-SHELL", "php -r '$$s=@fsockopen(\"127.0.0.1\",80); exit($$s?0:1);'"]
      interval: 5s
      timeout: 5s
      retries: 30

  wp-init:
    image: wordpress:cli-php8.3
    user: "0:0"
    depends_on:
      wordpress:
        condition: service_healthy
    environment:
      HOME: /tmp
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${DB_NAME:-wordpress}
      WORDPRESS_DB_USER: ${DB_USER:-wordpress}
      WORDPRESS_DB_PASSWORD: ${DB_PASSWORD:-wordpress}
      WP_URL: ${WP_URL:-http://localhost:8080}
      WP_TITLE: ${WP_TITLE:-Ольга Максименко — дизайнер интерьеров}
      WP_ADMIN_USER: ${WP_ADMIN_USER:-admin}
      WP_ADMIN_PASSWORD: ${WP_ADMIN_PASSWORD:-change-me-now}
      WP_ADMIN_EMAIL: ${WP_ADMIN_EMAIL:-admin@example.com}
    volumes:
      - wordpress_data:/var/www/html
      - ./wp-content/themes/olga-maksimenko:/var/www/html/wp-content/themes/olga-maksimenko
      - ./docker/init-wordpress.sh:/scripts/init-wordpress.sh:ro
    entrypoint: ["sh", "/scripts/init-wordpress.sh"]
    restart: "no"

  phpmyadmin:
    image: phpmyadmin:5-apache
    restart: unless-stopped
    profiles: ["tools"]
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: ${DB_USER:-wordpress}
      PMA_PASSWORD: ${DB_PASSWORD:-wordpress}

volumes:
  db_data:
  wordpress_data:
